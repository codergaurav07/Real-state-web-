<!DOCTYPE html>
<html>
<head>
  <title>Real Estate</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;

      /* 🔥 Background gradient */
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      margin: 0;
    }

    h1 {
      color: #2c3e50;
      margin-top: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
      margin: 20px;
      outline: none;
    }

    #list {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.9); /* glass effect */
      margin: 15px;
      padding: 10px;
      width: 220px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 8px;
      padding: 6px 10px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #details {
      display: none;
      margin-top: 20px;
    }

    #details img {
      width: 300px;
    }

  </style>

</head>

<body>

  <h1>🏠 Property Listing</h1>

  <input type="text" id="search" placeholder="Search city...">

  <div id="list"></div>

  <div id="details">
    <h2 id="price"></h2>
    <img id="image">
    <p id="city"></p>
    <p id="desc"></p>
    <button onclick="back()">Back</button>
  </div>

  <script>

    const data = [
      {price:"₹20 Lakh", city:"Jaipur", img:"https://www.dhamuandcompany.com/property/raj-aangan-nri-colony-jaipur/", desc:"2BHK house"},
      {price:"₹35 Lakh", city:"Delhi", img:"https://via.placeholder.com/200", desc:"3BHK flat"},
      {price:"₹15 Lakh", city:"Kota", img:"https://via.placeholder.com/200", desc:"1BHK room"},
      {price:"₹50 Lakh", city:"Mumbai", img:"https://via.placeholder.com/200", desc:"Luxury flat"},
      {price:"₹28 Lakh", city:"Ahmedabad", img:"https://ibb.co/nNcsWDtM", desc:"Modern house"}
    ];

    function show(list) {
      document.getElementById("list").innerHTML = "";

      list.forEach((item, i) => {
        document.getElementById("list").innerHTML += `
          <div class="card">
            <img src="${item.img}">
            <h3>${item.price}</h3>
            <p>${item.city}</p>
            <button onclick="details(${i})">View</button>
          </div>
        `;
      });
    }

    function details(i) {
      let p = data[i];

      document.getElementById("list").style.display = "none";
      document.getElementById("search").style.display = "none";
      document.getElementById("details").style.display = "block";

      document.getElementById("price").innerText = p.price;
      document.getElementById("image").src = p.img;
      document.getElementById("city").innerText = p.city;
      document.getElementById("desc").innerText = p.desc;
    }

    function back() {
      document.getElementById("details").style.display = "none";
      document.getElementById("list").style.display = "flex";
      document.getElementById("search").style.display = "inline";
    }

    document.getElementById("search").addEventListener("input", function() {
      let value = this.value.toLowerCase();

      let filtered = data.filter(item =>
        item.city.toLowerCase().includes(value)
      );

      show(filtered);
    });

    show(data);

  </script>

</body>
</html>
