<!DOCTYPE html>
<html>
<head>
  <title>Real Estate</title>

  <style>
    /* Page ka basic design */
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    /* Property cards ka layout */
    #list {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 10px;
      width: 200px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 8px;
      padding: 5px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }

    /* Details page hidden rahega start me */
    #details {
      display: none;
    }
  </style>

</head>

<body>

  <h1>🏠 Property Listing</h1>

  <!-- Search box -->
  <input type="text" id="search" placeholder="Search city...">

  <!-- Properties yaha show hongi -->
  <div id="list"></div>

  <!-- Details page -->
  <div id="details">
    <h2 id="price"></h2>
    <img id="image">
    <p id="city"></p>
    <p id="desc"></p>
    <button onclick="back()">Back</button>
  </div>

  <script>

    /* Step 1: Data store kiya (properties list) */
    const data = [
      {price:"₹20 Lakh", city:"Jaipur", img:"https://via.placeholder.com/200", desc:"2BHK house"},
      {price:"₹35 Lakh", city:"Delhi", img:"https://via.placeholder.com/200", desc:"3BHK flat"},
      {price:"₹15 Lakh", city:"Kota", img:"https://via.placeholder.com/200", desc:"1BHK room"}
    ];

    /* Step 2: List show karne ka function */
    function show(list) {
      document.getElementById("list").innerHTML = "";

      list.forEach((item, i) => {
        document.getElementById("list").innerHTML += `
          <div class="card">
            <img src="${item.img}">
            <h3>${item.price}</h3>
            <p>${item.city}</p>
            <button onclick="details(${i})">View</button>
          </div>
        `;
      });
    }

    /* Step 3: Details show */
    function details(i) {
      let p = data[i];

      document.getElementById("list").style.display = "none";
      document.getElementById("search").style.display = "none";
      document.getElementById("details").style.display = "block";

      document.getElementById("price").innerText = p.price;
      document.getElementById("image").src = p.img;
      document.getElementById("city").innerText = p.city;
      document.getElementById("desc").innerText = p.desc;
    }

    /* Step 4: Back button */
    function back() {
      document.getElementById("details").style.display = "none";
      document.getElementById("list").style.display = "flex";
      document.getElementById("search").style.display = "inline";
    }

    /* Step 5: Search feature */
    document.getElementById("search").addEventListener("input", function() {
      let value = this.value.toLowerCase();

      let filtered = data.filter(item =>
        item.city.toLowerCase().includes(value)
      );

      show(filtered);
    });

    /* Start me data show */
    show(data);

  </script>

</body>
</html>
