<!DOCTYPE html>
<html>
<head>
  <title>Dream Homes</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    input {
      padding: 10px;
      width: 250px;
      margin: 20px;
      border-radius: 5px;
      border: 1px solid gray;
    }

    #property-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .property {
      background: white;
      margin: 15px;
      padding: 10px;
      width: 230px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .property:hover {
      transform: translateY(-8px);
    }

    .property img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      margin-top: 10px;
      border: none;
      background: #27ae60;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1e8449;
    }

    #details {
      display: none;
      text-align: center;
      padding: 20px;
    }

    #details img {
      width: 320px;
      border-radius: 10px;
    }

    .back-btn {
      background: red;
    }
  </style>
</head>

<body>

<header>🏠 Dream Homes Property Listing</header>

<center>
<input type="text" id="search" placeholder="Search location...">
</center>

<div id="property-list"></div>

<!-- Details Page -->
<div id="details">
  <h2 id="d-price"></h2>
  <img id="d-image">
  <h3 id="d-location"></h3>
  <p id="d-desc"></p>
  <button onclick="contact()">Contact Owner</button><br><br>
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<script>

const properties = [
  {
    image: "https://via.placeholder.com/300",
    price: "₹25 Lakh",
    location: "Jaipur",
    desc: "2BHK house with garden and parking."
  },
  {
    image: "https://via.placeholder.com/300",
    price: "₹40 Lakh",
    location: "Delhi",
    desc: "3BHK flat near metro."
  },
  {
    image: "https://via.placeholder.com/300",
    price: "₹15 Lakh",
    location: "Kota",
    desc: "Affordable 1BHK for students."
  },
  {
    image: "https://via.placeholder.com/300",
    price: "₹60 Lakh",
    location: "Mumbai",
    desc: "Luxury apartment with sea view."
  },
  {
    image: "https://via.placeholder.com/300",
    price: "₹35 Lakh",
    location: "Ahmedabad",
    desc: "Modern 2BHK in prime area."
  },
  {
    image: "https://via.placeholder.com/300",
    price: "₹50 Lakh",
    location: "Bangalore",
    desc: "Spacious flat in IT hub."
  }
];

function showProperties(data) {
  const list = document.getElementById("property-list");
  list.innerHTML = "";

  data.forEach((p, index) => {
    list.innerHTML += `
      <div class="property">
        <img src="${p.image}">
        <h3>${p.price}</h3>
        <p>${p.location}</p>
        <button onclick="showDetails(${index})">View Details</button>
      </div>
    `;
  });
}

function showDetails(index) {
  const p = properties[index];

  document.getElementById("property-list").style.display = "none";
  document.getElementById("search").style.display = "none";
  document.getElementById("details").style.display = "block";

  document.getElementById("d-price").innerText = p.price;
  document.getElementById("d-image").src = p.image;
  document.getElementById("d-location").innerText = p.location;
  document.getElementById("d-desc").innerText = p.desc;
}

function goBack() {
  document.getElementById("details").style.display = "none";
  document.getElementById("property-list").style.display = "flex";
  document.getElementById("search").style.display = "inline-block";
}

function contact() {
  alert("Owner will contact you soon 📞");
}

showProperties(properties);

document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  const filtered = properties.filter(p =>
    p.location.toLowerCase().includes(value)
  );

  showProperties(filtered);
});

</script>

</body>
</html>
